name: Eval Gate

on:
  pull_request:
    branches: [ main ]

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: pip install -r requirements.txt
    - name: Run RAGAS Eval
      run: python phase-a/run_ragas_eval.py
      env:
        MOCK_MODE: "true"
    - name: Check Thresholds
      run: |
        python -c "
        import json
        with open('phase-a/ragas_summary.json') as f:
            data = json.load(f)
            if data['faithfulness'] < 0.85:
                print('Faithfulness too low')
                exit(1)
        "
